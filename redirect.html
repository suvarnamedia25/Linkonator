<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkonator - Redirecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: white; font-family: 'Segoe UI', sans-serif; }
        .main-card { background-color: #161b2c; border: 1px solid #2d364d; border-radius: 2rem; }
    </style>
</head>
<body class="flex flex-col items-center p-6 md:p-10">

    <div class="w-full max-w-3xl main-card p-10 text-center shadow-2xl mt-20">
        <h1 id="timerText" class="text-3xl font-bold mb-4 text-blue-400">Searching...</h1>
        <p class="text-gray-400 mb-8 italic">Preparing your smart app redirection.</p>
        
        <div class="border-2 border-dashed border-[#2d364d] text-gray-600 py-10 rounded-2xl mb-10 font-bold uppercase text-xs">
            Native Ad Slot (Revenue Engine)
        </div>
        <p class="text-[10px] text-gray-500 font-bold">SUVARNA MEDIA UTILITY</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxy9tjU9gjdKK0blt0MRk-Tc_n8-igju4",
            authDomain: "linkonator.firebaseapp.com",
            projectId: "linkonator",
            storageBucket: "linkonator.firebasestorage.app",
            messagingSenderId: "143202043038",
            appId: "1:143202043038:web:f1def347da0d73e8de278f",
            measurementId: "G-E93SYCVE4Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                document.getElementById('timerText').innerText = "Link Invalid";
                return;
            }

            try {
                // Fetching original URL from Firestore[cite: 1]
                const snap = await getDoc(doc(db, "links", id));

                if (snap.exists()) {
                    const originalUrl = snap.data().originalURL;
                    
                    let countdown = 5;
                    const timer = setInterval(() => {
                        countdown--;
                        document.getElementById('timerText').innerText = `Opening App in ${countdown}...`;
                        if (countdown <= 0) {
                            clearInterval(timer);
                            performRedirect(originalUrl);
                        }
                    }, 1000);

                } else {
                    document.getElementById('timerText').innerText = "Link Not Found";
                }
            } catch (err) {
                document.getElementById('timerText').innerText = "Error Fetching Data";
            }
        }

        function performRedirect(url) {
            let target = url;
            // Enhanced App Protocol detection[cite: 1]
            if (url.includes("youtube.com/watch?v=")) {
                const vid = url.split("v=")[1].split("&")[0];
                target = `vnd.youtube://${vid}`;
            } else if (url.includes("youtube.com/shorts/")) {
                const sid = url.split("shorts/")[1].split("?")[0];
                target = `vnd.youtube://shorts/${sid}`;
            } else if (url.includes("instagram.com")) {
                target = url.replace(/^https?:\/\//, "instagram://");
            }

            window.location.replace(target);
            setTimeout(() => { window.location.href = url; }, 2500); // Fallback[cite: 1]
        }

        init();
    </script>
</body>
</html>
