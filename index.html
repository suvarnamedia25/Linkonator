<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkonator - Smart App Linker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: white; font-family: 'Segoe UI', sans-serif; }
        .main-card { background-color: #161b2c; border: 1px solid #2d364d; border-radius: 2rem; }
        .input-field { background-color: #0d111d; border: 1px solid #1e2638; }
    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-10">

    <!-- Header Branding -->
    <div class="w-full max-w-4xl flex justify-between items-center mb-8 px-4">
        <div class="text-xl font-bold flex items-center gap-2">
            <span class="text-blue-400">⚡</span> Linkonator
        </div>
        <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Powered by Suvarna Media</p>
    </div>

    <!-- Main Tool Card -->
    <div class="w-full max-w-3xl main-card p-6 md:p-12 shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-2 text-white">Creator Smart Links</h1>
            <p class="text-gray-400 text-sm">Boost your engagement by opening apps directly.</p>
        </div>

        <!-- Input Section -->
        <div class="relative mb-6">
            <input type="text" id="urlInput" placeholder="Paste your YouTube, Insta, or FB link here..." 
                class="w-full p-5 input-field rounded-2xl text-center focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition text-white">
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col md:flex-row gap-3 mb-8">
            <button onclick="generateLink()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-blue-900/20">
                Generate Smart Link
            </button>
            
            <!-- Result Section (Initially Hidden) -->
            <div id="resultSection" class="hidden bg-slate-800 p-3 rounded-xl flex items-center gap-3 border border-slate-700">
                <span id="generatedLink" class="text-xs text-blue-400 truncate max-w-[150px]"></span>
                <button onclick="copyLink()" class="text-gray-400 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
                        <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3z"/>
                    </svg>
                </button>
            </div>
        </div>

        <p class="text-center text-[10px] text-gray-500 uppercase font-bold tracking-tighter">
            Safe • Secure • Fast Redirection
        </p>
    </div>

    <script>
        function generateLink() {
            const input = document.getElementById('urlInput').value.trim();
            if(!input) return alert("Please paste a link!");
            
            const finalURL = window.location.origin + "/redirect.html?jump=" + btoa(input);
            
            document.getElementById('generatedLink').innerText = finalURL;
            document.getElementById('resultSection').classList.remove('hidden');
        }

        function copyLink() {
            const link = document.getElementById('generatedLink').innerText;
            navigator.clipboard.writeText(link);
            alert("Link Copied!");
        }
    </script>
</body>
</html>
