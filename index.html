<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkonator - Smart App Linker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: white; font-family: 'Segoe UI', sans-serif; }
        .main-card { background-color: #161b2c; border: 1px solid #2d364d; border-radius: 2rem; }
        .input-field { background-color: #0d111d; border: 1px solid #1e2638; }
    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-10">

    <div class="w-full max-w-4xl flex justify-between items-center mb-8 px-4 text-white">
        <div class="text-xl font-bold flex items-center gap-2">
            <span class="text-blue-400">⚡</span> Linkonator
        </div>
        <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Powered by Suvarna Media</p>
    </div>

    <div class="w-full max-w-3xl main-card p-6 md:p-12 shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-2">Creator Smart Links</h1>
            <p class="text-gray-400 text-sm">Convert links to open directly in apps.</p>
        </div>

        <div class="relative mb-6">
            <input type="text" id="urlInput" placeholder="Paste link (YouTube, Insta, FB)..." 
                class="w-full p-5 input-field rounded-2xl text-center focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition text-white">
        </div>

        <div class="flex flex-col md:flex-row gap-3 mb-8">
            <button id="genBtn" onclick="generateLink()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-blue-900/20 text-white">
                Generate Short Link
            </button>
            <div id="resultSection" class="hidden bg-slate-800 p-3 rounded-xl flex items-center gap-3 border border-slate-700">
                <span id="generatedLink" class="text-xs text-blue-400 truncate max-w-[150px]"></span>
                <button onclick="copyLink()" class="text-gray-400 hover:text-white">Copy</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase Modular SDK imports for <script> tag usage[cite: 1]
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your specific Firebase config from screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyCxy9tjU9gjdKK0blt0MRk-Tc_n8-igju4",
            authDomain: "linkonator.firebaseapp.com",
            projectId: "linkonator",
            storageBucket: "linkonator.firebasestorage.app",
            messagingSenderId: "143202043038",
            appId: "1:143202043038:web:f1def347da0d73e8de278f",
            measurementId: "G-E93SYCVE4Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.generateLink = async function() {
            const input = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('genBtn');
            if(!input) return alert("Please paste a link!");

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // Saving to 'links' collection in Firestore
                const docRef = await addDoc(collection(db, "links"), {
                    originalURL: input,
                    createdAt: serverTimestamp()
                });

                // Creating short link using the unique Document ID
                const finalURL = window.location.origin + "/redirect.html?id=" + docRef.id;
                
                document.getElementById('generatedLink').innerText = finalURL;
                document.getElementById('resultSection').classList.remove('hidden');
                btn.innerText = "Generate Short Link";
                btn.disabled = false;
            } catch (e) {
                console.error("Error: ", e);
                alert("Check Firebase Rules - Test mode might be expired or blocked.");
                btn.innerText = "Generate Short Link";
                btn.disabled = false;
            }
        }

        window.copyLink = function() {
            const link = document.getElementById('generatedLink').innerText;
            navigator.clipboard.writeText(link);
            alert("Copied!");
        }
    </script>
</body>
</html>
